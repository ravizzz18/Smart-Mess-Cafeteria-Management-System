{% extends "student/base_student.html" %}
{% set page_title = "Menu" %}
{% block content %}
<div class="card shadow-sm">
    <div class="card-body">
        <div class="table-responsive">
            <table class="table table-striped align-middle">
                <thead>
                    <tr>
                        <th>Date</th>
                        <th>Item</th>
                        <th>Meal Type</th>
                        <th>Price</th>
                    </tr>
                </thead>
                <tbody>
                    {% for item in menu_items %}
                    <tr>
                        <td>{{ item.available_date }}</td>
                        <td>{{ item.item_name }}</td>
                        <td>{{ item.meal_type }}</td>
                        <td>{{ item.price }}</td>
                    </tr>
                    {% else %}
                    <tr>
                        <td colspan="4" class="text-center text-muted">No menu entries yet.</td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
</div>
{% endblock %}
