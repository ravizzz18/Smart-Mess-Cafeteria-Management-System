<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>{{ title or "Student Portal" }}</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{{ url_for('static', filename='css/styles.css') }}">
</head>
<body class="app-shell">
    <aside class="sidebar">
        <div class="sidebar-header">Smart Mess</div>
        <nav class="nav flex-column">
            <a class="nav-link" href="{{ url_for('student.dashboard') }}">Dashboard</a>
            <a class="nav-link" href="{{ url_for('student.menu') }}">Menu</a>
            <a class="nav-link" href="{{ url_for('student.order_history') }}">Orders</a>
            <a class="nav-link" href="{{ url_for('student.payment_history') }}">Payments</a>
            <a class="nav-link" href="{{ url_for('student.feedback') }}">Feedback</a>
            <a class="nav-link" href="{{ url_for('auth.logout') }}">Logout</a>
        </nav>
    </aside>
    <main class="content">
        <header class="page-header">
            <h1>{{ page_title or "Student" }}</h1>
        </header>
        {% with messages = get_flashed_messages(with_categories=true) %}
        {% if messages %}
        <div class="mb-3">
            {% for category, message in messages %}
            <div class="alert alert-{{ category }}">{{ message }}</div>
            {% endfor %}
        </div>
        {% endif %}
        {% endwith %}
        {% block content %}{% endblock %}
    </main>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
    <script src="{{ url_for('static', filename='js/student.js') }}"></script>
</body>
</html>
